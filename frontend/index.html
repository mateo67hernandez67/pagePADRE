<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel de automatizaciones</title>
<style>
  /* ── Reset y base ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: #161618;
    color: #d4d4d8;
    padding: 24px 20px;
    min-height: 100vh;
  }

  /* ── Header ── */
  .header { margin-bottom: 28px; }
  .header h1 { font-size: 22px; font-weight: 700; color: #f4f4f5; margin-bottom: 4px; }
  .header p  { font-size: 13px; color: #71717a; }

  /* ── Sección de scripts ── */
  .seccion-titulo {
    font-size: 11px; font-weight: 600; letter-spacing: 0.8px;
    color: #71717a; text-transform: uppercase; margin-bottom: 12px;
  }
  .scripts-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 10px;
    margin-bottom: 32px;
  }

  /* ── Tarjeta de script (botón) ── */
  .script-card {
    background: #1c1c1f;
    border: 1px solid #27272a;
    border-radius: 10px;
    padding: 14px 16px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    text-align: left;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .script-card:hover:not(:disabled) {
    border-color: #3f3f46;
    background: #222226;
  }
  .script-card:disabled {
    opacity: 0.45;
    cursor: not-allowed;
  }
  .script-card .sc-nombre {
    font-size: 14px;
    font-weight: 600;
    color: #f4f4f5;
    line-height: 1.3;
  }
  .script-card .sc-desc {
    font-size: 12px;
    color: #71717a;
    line-height: 1.4;
  }
  .script-card .sc-meta {
    display: flex;
    flex-direction: column;
    gap: 4px;
    margin-top: 2px;
  }
  .script-card .sc-badge {
    font-size: 11px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 4px;
    align-self: flex-start;
    letter-spacing: 0.2px;
  }
  .badge-correo     { background: #1e3a5f; color: #7eb8f7; }
  .badge-automatico { background: #3a2e00; color: #f0c040; }
  .badge-ninguno    { background: #27272a; color: #71717a; }
  .sc-dep-warning {
    font-size: 11px;
    color: #f0a040;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  /* ── Indicador de estado del agente ── */
  .agente-status {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: #71717a;
    margin-bottom: 20px;
    padding: 5px 10px;
    background: #1c1c1f;
    border: 1px solid #27272a;
    border-radius: 20px;
  }
  .agente-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #71717a;
    transition: background 0.3s;
  }
  .agente-dot.activo  { background: #22c55e; box-shadow: 0 0 6px #22c55e88; }
  .agente-dot.inactivo { background: #ef4444; }

  /* ── Tarjetas de job ── */
  .jobs-lista { display: flex; flex-direction: column; gap: 14px; }
  .job-card {
    background: #1c1c1f;
    border: 1px solid #27272a;
    border-radius: 10px;
    padding: 16px;
    transition: border-color 0.2s;
  }
  .job-card.activo { border-color: #3f3f46; }

  .job-header {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 12px;
  }
  .job-nombre { font-weight: 600; font-size: 15px; color: #f4f4f5; }
  .job-id-label { font-size: 11px; color: #52525b; margin-left: auto; font-family: monospace; }

  /* ── Chips de estado ── */
  .estado {
    font-size: 11px; font-weight: 700; letter-spacing: 0.3px;
    padding: 3px 9px; border-radius: 20px; text-transform: uppercase;
  }
  .estado.pendiente             { background: #1e3a5f; color: #7eb8f7; }
  .estado.ejecutando            { background: #14532d; color: #86efac; }
  .estado.esperando_confirmacion{ background: #451a03; color: #fdba74; }
  .estado.finalizado            { background: #14532d; color: #86efac; }
  .estado.error                 { background: #450a0a; color: #fca5a5; }
  .estado.cancelando            { background: #292524; color: #d6d3d1; }
  .estado.cancelado             { background: #27272a; color: #71717a; }

  /* ── Terminal ── */
  pre.terminal {
    background: #0d0d0f;
    color: #22c55e;
    padding: 12px 14px;
    border-radius: 8px;
    max-height: 280px;
    overflow-y: auto;
    font-size: 12px;
    font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    white-space: pre-wrap;
    word-break: break-all;
    border: 1px solid #18181b;
    margin-bottom: 12px;
  }
  pre.terminal:empty { display: none; }

  /* ── Acciones del job ── */
  .acciones { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
  .acciones button {
    padding: 8px 16px; border-radius: 7px; border: none;
    cursor: pointer; font-size: 13px; font-weight: 500;
    transition: opacity 0.15s;
  }
  .acciones button:hover { opacity: 0.85; }
  .btn-cancelar  { background: #7f1d1d; color: #fca5a5; }
  .btn-enviar    { background: #14532d; color: #86efac; }
  .btn-reintentar{ background: #27272a; color: #d4d4d8; }

  /* ── Avisos ── */
  .aviso {
    font-size: 13px;
    padding: 6px 0;
    min-height: 22px;
  }
  .aviso-ok    { color: #86efac; }
  .aviso-error { color: #fca5a5; }
  .aviso-warn  { color: #fdba74; }
  .aviso-info  { color: #71717a; }

  /* ── Tiempo transcurrido ── */
  .job-tiempo { font-size: 11px; color: #52525b; margin-left: 4px; }

  /* ── Botones de limpiar historial ── */
  .btn-limpiar {
    padding: 6px 14px; border-radius: 7px; border: 1px solid #3f3f46;
    background: #1c1c1f; color: #a1a1aa; cursor: pointer;
    font-size: 12px; font-weight: 500;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  .btn-limpiar:hover { background: #27272a; color: #f4f4f5; border-color: #52525b; }
  .btn-limpiar-todo:hover { background: #450a0a; color: #fca5a5; border-color: #7f1d1d; }

  /* ── Animación pulso para ejecutando ── */
  @keyframes pulso { 0%,100% { opacity:1; } 50% { opacity:0.5; } }
  .pulsando { animation: pulso 1.5s ease-in-out infinite; }

  /* ── Spinner ── */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    display: inline-block; width: 12px; height: 12px;
    border: 2px solid #3f3f46; border-top-color: #86efac;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    vertical-align: middle;
    margin-right: 4px;
  }
</style>
</head>
<body>

<div class="header">
  <h1>Panel de automatizaciones</h1>
  <p>Ejecuta y monitorea scripts remotos desde el navegador.</p>
</div>

<div class="agente-status" id="agente-status">
  <span class="agente-dot" id="agente-dot"></span>
  <span id="agente-texto">Verificando agente...</span>
</div>

<p class="seccion-titulo">Scripts disponibles</p>
<div id="scripts" class="scripts-grid">
  <div style="color:#52525b;font-size:13px">Cargando...</div>
</div>

<p class="seccion-titulo">Ejecuciones recientes</p>
<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap">
  <button class="btn-limpiar" id="btn-limpiar-finalizados" onclick="limpiarHistorial('finalizados')">
    🗑 Limpiar finalizados
  </button>
  <button class="btn-limpiar btn-limpiar-todo" id="btn-limpiar-todos" onclick="limpiarHistorial('todos')">
    🗑 Limpiar todo
  </button>
  <span id="limpiar-status" style="font-size:12px;color:#71717a"></span>
</div>
<div id="jobs" class="jobs-lista"></div>

<script>
const BACKEND_URL = "https://pagepadre-akhc.onrender.com";

// job_id → intervalId
const jobsActivos = {};
// nombre_script → estado (para verificar dependencias en el frontend)
const ultimosFinalizados = {};

// ─── API helper ─────────────────────────────────────────────────────────────
async function apiFetch(path, opciones = {}) {
  const resp = await fetch(BACKEND_URL + path, opciones);
  if (!resp.ok) throw new Error(`Error ${resp.status} en ${path}`);
  return resp.json();
}

// ─── Verificar si el agente está activo (hay un job ejecutando recientemente) ──
async function verificarAgente() {
  try {
    const jobs = await apiFetch("/jobs?limite=10");
    const ahora = Date.now();
    const activo = jobs.some(j => {
      if (!["ejecutando", "esperando_confirmacion", "pendiente"].includes(j.estado)) return false;
      const ts = j.iniciado_en ? new Date(j.iniciado_en).getTime() : 0;
      return ahora - ts < 5 * 60 * 1000; // activo si tiene job en los últimos 5 min
    });
    // También consideramos activo si hay un job pendiente (el agente podría estar leyendo)
    const hayPendiente = jobs.some(j => j.estado === "pendiente");

    const dot   = document.getElementById("agente-dot");
    const texto = document.getElementById("agente-texto");
    if (activo || hayPendiente) {
      dot.className   = "agente-dot activo";
      texto.textContent = "Agente conectado";
    } else {
      dot.className   = "agente-dot";
      texto.textContent = "Agente en espera";
    }
  } catch (e) {
    const dot = document.getElementById("agente-dot");
    dot.className = "agente-dot inactivo";
    document.getElementById("agente-texto").textContent = "Sin conexión al backend";
  }
}

// ─── Carga del catálogo de scripts ──────────────────────────────────────────
async function cargarScripts() {
  try {
    const scripts = await apiFetch("/scripts");
    const cont = document.getElementById("scripts");
    cont.innerHTML = "";

    // Construir mapa nombre → estado de hoy
    const hoy = new Date().toISOString().slice(0, 10);
    let jobsHoy = [];
    try {
      const todos = await apiFetch("/jobs?limite=100");
      jobsHoy = todos.filter(j => {
        const ts = j.finalizado_en || j.creado_en || "";
        return ts.slice(0, 10) === hoy && j.estado === "finalizado";
      });
    } catch(e) {}

    const finalizadosHoy = new Set(jobsHoy.map(j => j.nombre_script));

    scripts.forEach(s => {
      const tipo = s.tipo_envio || "ninguno";
      const labelTexto = {
        correo:     "✉ Confirmar antes de enviar",
        automatico: "⚡ Envío automático al terminar",
        ninguno:    "Sin envío",
      }[tipo] || "Sin envío";

      const deps = s.dependencias || [];
      const depsFaltantes = deps.filter(d => !finalizadosHoy.has(d));
      const bloqueado = depsFaltantes.length > 0;

      const depHtml = bloqueado
        ? `<span class="sc-dep-warning">⚠ Requiere: ${depsFaltantes.join(", ")}</span>`
        : (deps.length > 0 ? `<span style="font-size:11px;color:#52525b">↳ ${deps.join(", ")}</span>` : "");

      const card = document.createElement("button");
      card.className = "script-card";
      card.id = `btn-${s._id}`;
      card.disabled = bloqueado;
      card.innerHTML = `
        <span class="sc-nombre">${s.nombre}</span>
        <span class="sc-desc">${s.descripcion || ""}</span>
        <div class="sc-meta">
          <span class="sc-badge badge-${tipo}">${labelTexto}</span>
          ${depHtml}
        </div>
      `;
      card.onclick = () => lanzarJob(s._id, s.nombre, s.tipo_envio, card);
      cont.appendChild(card);
    });
  } catch (e) {
    document.getElementById("scripts").innerHTML =
      `<div style="color:#fca5a5;font-size:13px">Error al cargar scripts: ${e.message}</div>`;
  }
}

// ─── Lanzar un job ───────────────────────────────────────────────────────────
async function lanzarJob(scriptId, nombreScript, tipoEnvio, btn) {
  btn.disabled = true;
  try {
    const { job_id } = await apiFetch(`/jobs?script_id=${scriptId}`, { method: "POST" });
    crearTarjetaJob(job_id, nombreScript, tipoEnvio);
    monitorearJob(job_id, tipoEnvio);
  } catch (e) {
    console.error("Error al lanzar job:", e);
    alert(`No se pudo iniciar "${nombreScript}". Verifica que el backend esté activo.`);
    btn.disabled = false;
  } finally {
    setTimeout(() => { btn.disabled = false; }, 3000);
  }
}

// ─── Tarjeta de seguimiento ──────────────────────────────────────────────────
function crearTarjetaJob(jobId, nombreScript = "", tipoEnvio = "ninguno") {
  if (document.getElementById(`job-${jobId}`)) return;

  const div = document.createElement("div");
  div.className = "job-card";
  div.id = `job-${jobId}`;
  div.dataset.tipoEnvio = tipoEnvio;
  div.innerHTML = `
    <div class="job-header">
      <span class="job-nombre">${nombreScript}</span>
      <span class="estado pendiente pulsando" id="estado-${jobId}">pendiente</span>
      <span class="job-tiempo" id="tiempo-${jobId}"></span>
      <span class="job-id-label">${jobId.slice(-8)}</span>
    </div>
    <pre class="terminal" id="terminal-${jobId}"></pre>
    <div id="acciones-${jobId}"></div>
    <div id="aviso-${jobId}" class="aviso"></div>
  `;
  document.getElementById("jobs").prepend(div);
}

// ─── Jobs recientes al cargar la página ─────────────────────────────────────
const ESTADOS_ACTIVOS = ["pendiente", "ejecutando", "esperando_confirmacion", "cancelando"];

async function cargarJobsRecientes() {
  try {
    const jobs = await apiFetch("/jobs?limite=20");
    for (const job of jobs) {
      const tipoEnvio = job.tipo_envio || "ninguno";
      crearTarjetaJob(job._id, job.nombre_script, tipoEnvio);
      actualizarTarjeta(job._id, job);
      if (ESTADOS_ACTIVOS.includes(job.estado)) {
        monitorearJob(job._id, tipoEnvio);
      }
      // Registrar finalizados para la verificación de dependencias
      if (job.estado === "finalizado") {
        ultimosFinalizados[job.nombre_script] = "finalizado";
      }
    }
  } catch (e) {
    console.error("Error al cargar jobs recientes:", e);
  }
}

// ─── Polling de un job ───────────────────────────────────────────────────────
function monitorearJob(jobId, tipoEnvio = "ninguno") {
  if (jobsActivos[jobId]) return;
  const tarjeta = document.getElementById(`job-${jobId}`);
  if (tarjeta) tarjeta.classList.add("activo");

  jobsActivos[jobId] = setInterval(async () => {
    try {
      const job = await apiFetch(`/jobs/${jobId}`);
      actualizarTarjeta(jobId, job);

      if (job.estado === "finalizado") {
        ultimosFinalizados[job.nombre_script] = "finalizado";
        // Recargar scripts para actualizar estado de dependencias
        cargarScripts();
      }

      const terminado = ["finalizado", "cancelado", "error"].includes(job.estado);
      if (terminado) {
        clearInterval(jobsActivos[jobId]);
        delete jobsActivos[jobId];
        if (tarjeta) tarjeta.classList.remove("activo");
        verificarAgente();
      }
    } catch (e) {
      console.error(`Error monitoreando job ${jobId}:`, e);
    }
  }, 2500);
}

// ─── Actualización de una tarjeta ───────────────────────────────────────────
function actualizarTarjeta(jobId, job) {
  const estadoEl = document.getElementById(`estado-${jobId}`);
  if (!estadoEl) return;

  estadoEl.textContent = etiquetaEstado(job.estado);
  estadoEl.className = `estado ${job.estado}`;

  // Pulso solo para estados activos
  if (["pendiente", "ejecutando"].includes(job.estado)) {
    estadoEl.classList.add("pulsando");
  } else {
    estadoEl.classList.remove("pulsando");
  }

  // Tiempo transcurrido
  const tiempoEl = document.getElementById(`tiempo-${jobId}`);
  if (tiempoEl && job.iniciado_en) {
    const inicio = new Date(job.iniciado_en);
    const fin    = job.finalizado_en ? new Date(job.finalizado_en) : new Date();
    const segs   = Math.floor((fin - inicio) / 1000);
    const mins   = Math.floor(segs / 60);
    const resto  = segs % 60;
    tiempoEl.textContent = mins > 0 ? `${mins}m ${resto}s` : `${segs}s`;
  }

  // Terminal
  const terminal = document.getElementById(`terminal-${jobId}`);
  if (terminal) {
    const logs = job.logs || [];
    if (logs.length) {
      terminal.textContent = logs.join("\n");
      terminal.scrollTop = terminal.scrollHeight;
    }
  }

  const acciones = document.getElementById(`acciones-${jobId}`);
  const aviso    = document.getElementById(`aviso-${jobId}`);
  const tipoEnvio = job.tipo_envio
    || document.getElementById(`job-${jobId}`)?.dataset.tipoEnvio
    || "ninguno";

  aviso.innerHTML = "";
  acciones.innerHTML = "";

  // ── Botón cancelar durante ejecución ──
  if (job.estado === "pendiente" || job.estado === "ejecutando") {
    acciones.innerHTML = `
      <div class="acciones">
        <button class="btn-cancelar" onclick="cancelar('${jobId}')">✕ Cancelar</button>
      </div>`;

  // ── Confirmación de envío ──
  } else if (job.estado === "esperando_confirmacion" && !job.accion_usuario) {
    const nombreScript = job.nombre_script || document.querySelector(`#job-${jobId} .job-nombre`)?.textContent || "";
    acciones.innerHTML = `
      <div style="background:#1a1a1e;border:1px solid #3f3f46;border-radius:8px;padding:14px;margin-bottom:8px">
        <p style="font-size:13px;color:#a1a1aa;margin:0 0 10px">
          ✅ <strong style="color:#f4f4f5">${nombreScript}</strong> finalizó correctamente.
          ¿Querés enviar el correo ahora?
        </p>
        <div class="acciones">
          <button class="btn-enviar" onclick="decidir('${jobId}','enviar_correo')">
            ✉ Sí, enviar correo
          </button>
          <button class="btn-reintentar" onclick="decidir('${jobId}','reejecutar_sin_correo')">
            ↩ No, reejecutar sin enviar
          </button>
        </div>
      </div>`;
  }

  // ── Avisos de estado ──
  if (job.estado === "error") {
    aviso.innerHTML = `<span class="aviso-error">✘ Error: ${job.error_mensaje || "sin detalle"}</span>`;
  } else if (job.estado === "cancelando") {
    aviso.innerHTML = `<span class="aviso-warn">⏳ Cancelando... el agente está deteniendo el proceso.</span>`;
  } else if (job.estado === "cancelado") {
    aviso.innerHTML = `<span class="aviso-info">Automatización cancelada.</span>`;
  } else if (job.estado === "finalizado" && tipoEnvio === "ninguno") {
    aviso.innerHTML = `<span class="aviso-ok">✔ Finalizado correctamente.</span>`;
  }

  // ── Estado del correo ──
  if (job.estado_correo === "enviado") {
    const fecha = job.correo_enviado_en
      ? new Date(job.correo_enviado_en).toLocaleString("es-CO")
      : "";
    aviso.innerHTML = `<span class="aviso-ok">✉ Correo enviado${fecha ? " · " + fecha : ""}.</span>`;
  } else if (job.estado_correo === "error_envio") {
    aviso.innerHTML = `<span class="aviso-error">✘ Falló el envío del correo.</span>`;
  }
}

function etiquetaEstado(estado) {
  const mapa = {
    pendiente:              "pendiente",
    ejecutando:             "ejecutando",
    esperando_confirmacion: "esperando confirmación",
    finalizado:             "finalizado",
    error:                  "error",
    cancelando:             "cancelando",
    cancelado:              "cancelado",
  };
  return mapa[estado] || estado;
}

// ─── Acciones del usuario ────────────────────────────────────────────────────
async function cancelar(jobId) {
  try {
    await apiFetch(`/jobs/${jobId}/cancelar`, { method: "POST" });
    document.getElementById(`acciones-${jobId}`).innerHTML = "";
    document.getElementById(`aviso-${jobId}`).innerHTML =
      `<span class="aviso-warn">⏳ Cancelando...</span>`;
  } catch (e) {
    alert("No se pudo cancelar. Intenta de nuevo.");
  }
}

async function decidir(jobId, accion) {
  try {
    await apiFetch(`/jobs/${jobId}/action?accion=${accion}`, { method: "POST" });
    document.getElementById(`acciones-${jobId}`).innerHTML =
      `<span style="color:#71717a;font-size:13px"><span class="spinner"></span> Procesando...</span>`;
    if (!jobsActivos[jobId]) {
      const tipoEnvio = document.getElementById(`job-${jobId}`)?.dataset.tipoEnvio || "ninguno";
      monitorearJob(jobId, tipoEnvio);
    }
  } catch (e) {
    alert("No se pudo registrar la acción. Intenta de nuevo.");
  }
}

// ─── Limpiar historial ───────────────────────────────────────────────────────
async function limpiarHistorial(modo) {
  const labels = { finalizados: "los jobs finalizados/error/cancelados", todos: "TODO el historial" };
  if (!confirm(`¿Eliminar ${labels[modo]}?\n\nLos jobs activos (ejecutando/pendientes) no se tocan.`)) return;

  const statusEl = document.getElementById("limpiar-status");
  statusEl.textContent = "Eliminando...";

  try {
    const res = await apiFetch(`/jobs/historial?estado=${modo}`, { method: "DELETE" });
    statusEl.textContent = `✔ Eliminados ${res.eliminados} jobs y ${res.logs_eliminados} logs`;
    // Limpiar las tarjetas del DOM también
    document.getElementById("jobs").innerHTML = "";
    // Limpiar el mapa de jobs activos
    for (const id in jobsActivos) {
      clearInterval(jobsActivos[id]);
      delete jobsActivos[id];
    }
    setTimeout(() => { statusEl.textContent = ""; }, 4000);
  } catch (e) {
    statusEl.textContent = `✘ Error al limpiar: ${e.message}`;
    console.error(e);
  }
}

// ─── Arranque ────────────────────────────────────────────────────────────────
verificarAgente();
cargarScripts();
cargarJobsRecientes();

// Refrescar estado del agente cada 30 s
setInterval(verificarAgente, 30_000);
</script>
</body>
</html>
